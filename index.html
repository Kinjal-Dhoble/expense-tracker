<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Lavender Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #d1c4e9 100%);
            --card-bg: #ffffff;
            --primary-lavender: #9575cd; 
            --dark-lavender: #673ab7;    
            --text-main: #4a4a4a;
            --text-heading: #311b92;     
            --delete-btn: #ef5350;
            --success-bg: #edebf7;
            --progress-bg: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(103, 58, 183, 0.1);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 { color: var(--text-heading); margin: 0; font-weight: 700; }

        .btn-export {
            padding: 10px 18px;
            background: #fff;
            border: 2px solid var(--primary-lavender);
            color: var(--primary-lavender);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-export:hover { 
            background: var(--primary-lavender); 
            color: #fff;
            transform: scale(1.05);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-top: 10px;
        }

        .form-section {
            background: #fcfaff;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #ede7f6;
        }

        .chart-section {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ede7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group { display: flex; flex-direction: column; }

        label { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: var(--primary-lavender); text-transform: uppercase; }

        input, select { padding: 10px; border: 1.5px solid #d1c4e9; border-radius: 10px; outline: none; }

        .btn-add {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: var(--primary-lavender);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-add:hover { background-color: var(--dark-lavender); }

        .table-container { margin-top: 30px; max-height: 300px; overflow-y: auto; border-radius: 12px; }

        table { width: 100%; border-collapse: collapse; }

        th { background-color: var(--primary-lavender); color: white; position: sticky; top: 0; padding: 12px; font-size: 14px; }

        td { padding: 12px; border-bottom: 1px solid #f3e5f5; text-align: center; font-size: 14px; background: #fff; }

        .delete-btn { background-color: var(--delete-btn); padding: 6px 10px; border: none; color: white; border-radius: 6px; cursor: pointer; }

        .total-display {
            margin-top: 20px;
            padding: 20px;
            background: var(--success-bg);
            color: var(--text-heading);
            border-radius: 15px;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            border: 1.5px dashed var(--primary-lavender);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h2><i class="fas fa-wallet"></i> Expense Tracker</h2>
        <button class="btn-export" onclick="downloadExcelReport()">
            <i class="fas fa-file-excel"></i> Download Excel Report
        </button>
    </div>

    <div class="dashboard">
        <div class="form-section">
            <div class="form-row">
                <div class="form-group"><label>Date</label><input type="date" id="date"></div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="">Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Description</label><input type="text" id="description" placeholder="Item name..."></div>
                <div class="form-group"><label>Amount</label><input type="number" id="amount" placeholder="0.00"></div>
            </div>
            <button class="btn-add" onclick="addExpense()">Add Expense</button>
        </div>

        <div class="chart-section">
            <label style="color:var(--primary-lavender); margin-bottom: 10px;">Spending Breakdown</label>
            <canvas id="categoryChart" width="200" height="200"></canvas>
            <div id="chartLegend" style="font-size: 10px; margin-top: 10px;"></div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="expenseBody"></tbody>
        </table>
    </div>

    <div class="total-display">Total Spent: <span id="totalDisplay">₹0.00</span></div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('myExpenses')) || [];
    const categoryColors = {'Food': '#9575cd', 'Transport': '#7986cb', 'Shopping': '#a1887f', 'Bills': '#4db6ac', 'Entertainment': '#f06292', 'Other': '#90a4ae'};

    document.getElementById('date').valueAsDate = new Date();

    function addExpense() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('description').value;
        const cat = document.getElementById('category').value;
        const amt = parseFloat(document.getElementById('amount').value);

        if (!date || !desc || !cat || isNaN(amt) || amt <= 0) return;

        expenses.push({ id: Date.now(), date, description: desc, category: cat, amount: amt });
        saveAndRefresh();
        document.getElementById('description').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteExpense(id) {
        if(confirm("Delete this entry?")) {
            expenses = expenses.filter(e => e.id !== id);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('myExpenses', JSON.stringify(expenses));
        updateUI();
    }

    function updateUI() {
        const tbody = document.getElementById('expenseBody');
        tbody.innerHTML = '';
        let total = 0;

        expenses.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(exp => {
            total += exp.amount;
            tbody.innerHTML += `
                <tr>
                    <td>${exp.date}</td>
                    <td><span style="color:${categoryColors[exp.category]}">●</span> ${exp.category}</td>
                    <td>${exp.description}</td>
                    <td style="font-weight:bold; color:var(--text-heading)">₹${exp.amount.toFixed(2)}</td>
                    <td><button class="delete-btn" onclick="deleteExpense(${exp.id})"><i class="fas fa-trash"></i></button></td>
                </tr>
            `;
        });
        document.getElementById('totalDisplay').innerText = `₹${total.toFixed(2)}`;
        drawChart();
    }

    function drawChart() {
        const canvas = document.getElementById('categoryChart');
        const ctx = canvas.getContext('2d');
        const legend = document.getElementById('chartLegend');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const totals = {};
        expenses.forEach(e => totals[e.category] = (totals[e.category] || 0) + e.amount);
        const grandTotal = Object.values(totals).reduce((a, b) => a + b, 0);

        if (grandTotal === 0) {
            ctx.fillStyle = "#f3f0f7"; ctx.beginPath(); ctx.arc(100, 100, 70, 0, Math.PI * 2); ctx.fill();
            legend.innerHTML = "No data available"; return;
        }

        let startAngle = 0; legend.innerHTML = "";
        for (const cat in totals) {
            const slice = (totals[cat] / grandTotal) * Math.PI * 2;
            ctx.fillStyle = categoryColors[cat]; ctx.beginPath(); ctx.moveTo(100, 100);
            ctx.arc(100, 100, 70, startAngle, startAngle + slice); ctx.closePath(); ctx.fill();
            legend.innerHTML += `<span style="margin-right:8px;"><i class="fas fa-circle" style="color:${categoryColors[cat]}; font-size:7px;"></i> ${cat}</span>`;
            startAngle += slice;
        }
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(100, 100, 45, 0, Math.PI * 2); ctx.fill();
    }

    // FUNCTION TO DOWNLOAD EXCEL COMPATIBLE REPORT
    function downloadExcelReport() {
        if (expenses.length === 0) {
            alert("Your list is empty. Add some expenses first!");
            return;
        }

        // CSV Header
        let csvContent = "Date,Category,Description,Amount (INR)\n";

        // Add each expense row
        expenses.forEach(e => {
            // Clean description of any commas to prevent breaking CSV format
            const cleanDesc = e.description.replace(/,/g, " ");
            csvContent += `${e.date},${e.category},${cleanDesc},${e.amount}\n`;
        });

        // Add a total row at the bottom
        const total = expenses.reduce((sum, e) => sum + e.amount, 0);
        csvContent += `\n, ,TOTAL SPENT,${total.toFixed(2)}`;

        // Create the download link
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        link.setAttribute("href", url);
        link.setAttribute("download", "My_Expenses_Report.csv");
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    window.onload = updateUI;
</script>
</body>
</html>
